name: Auto Triage

on:
  issues:
    types: [labeled]

jobs:
  auto-triage:
    name: Triage auto-detected bugs
    runs-on: ubuntu-latest
    if: >-
      github.event.label.name == 'bug:auto'
      && github.event.issue.user.login != 'github-actions[bot]'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check for existing triage comment
        id: check_comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });

            const alreadyTriaged = comments.some(c =>
              c.body.includes('Auto-Triage')
              && c.user.type === 'Bot'
            );

            core.setOutput('already_triaged', alreadyTriaged.toString());

      - name: Post triage comment
        if: steps.check_comment.outputs.already_triaged != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '## Auto-Triage',
                '',
                'This bug was automatically detected from a production error.',
                '',
                'To fix it, run:',
                '',
                '```',
                `/work-ticket #${issueNumber}`,
                '```',
                '',
                'The agent will read the error details above, create a fix,',
                'and open a pull request for your review.',
                '',
                '---',
                '*Automated by auto-triage workflow.*',
              ].join('\n'),
            });

      - name: Add priority label
        if: steps.check_comment.outputs.already_triaged != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['P1'],
              });
            } catch (e) {
              // Label may not exist yet -- create it
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'P1',
                  color: 'ff6600',
                  description: 'Important - current sprint',
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  labels: ['P1'],
                });
              } catch (e2) {
                core.warning('Could not add P1 label: ' + e2.message);
              }
            }
