name: Verify Agent Restrictions

# Run weekly verification tests to ensure agent safety controls remain effective
# Tests run every Sunday at 00:00 UTC
# Can also be triggered manually via workflow_dispatch

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - protocol
          - permissions
          - docs
      verbose:
        description: 'Enable verbose output'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read
  actions: read
  issues: write

jobs:
  verify-restrictions:
    runs-on: ubuntu-latest
    name: Verify Agent Safety Restrictions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          gh --version

      - name: Run verification tests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine test options
          TEST_ARGS=""
          if [ "${{ inputs.test_category }}" != "" ] && [ "${{ inputs.test_category }}" != "all" ]; then
            TEST_ARGS="--test ${{ inputs.test_category }}"
          fi
          if [ "${{ inputs.verbose }}" = "true" ]; then
            TEST_ARGS="$TEST_ARGS --verbose"
          fi

          # Run verification tests
          ./scripts/verify-agent-restrictions.sh $TEST_ARGS | tee verification-results.txt

      - name: Upload verification results
        uses: actions/upload-artifact@v4
        with:
          name: verification-results-${{ github.run_number }}
          path: verification-results.txt
          retention-days: 90

      - name: Check for failures
        id: check_failures
        run: |
          if grep -q "FAILED:" verification-results.txt 2>/dev/null; then
            echo "failures_found=true" >> $GITHUB_OUTPUT
            echo "WARNING: Verification tests failed!"
          else
            echo "failures_found=false" >> $GITHUB_OUTPUT
            echo "All verification tests passed."
          fi

      - name: Create issue for failures (if found)
        if: steps.check_failures.outputs.failures_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('verification-results.txt', 'utf8');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ALERT] Agent Restriction Verification Failed - ${new Date().toISOString().split('T')[0]}`,
              labels: ['safety', 'security', 'audit'],
              body: `## Agent Restriction Verification Failed

            One or more agent safety restriction tests failed during the weekly verification.

            **Report Date:** ${new Date().toISOString().split('T')[0]}
            **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            ### Verification Results

            \`\`\`
            ${results}
            \`\`\`

            ### Action Required

            1. Review the failed tests above
            2. Check agent policy files in \`.claude/agents/\`
            3. Verify NON-NEGOTIABLE PROTOCOL blocks are intact
            4. Check branch protection rules
            5. Review settings.template.json deny rules

            ### Investigation Steps

            1. Run verification locally: \`./scripts/verify-agent-restrictions.sh --verbose\`
            2. Review recent changes to agent policies
            3. Check if branch protection was modified
            4. Verify bot account permissions

            ---
            *This issue was automatically created by the Agent Restriction Verification workflow.*
            `
            });

            console.log(`Created issue #${issue.data.number}`);

      - name: Summary
        run: |
          echo "## Agent Restriction Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat verification-results.txt >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full results available in workflow artifacts." >> $GITHUB_STEP_SUMMARY
