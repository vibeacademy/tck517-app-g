name: Auto Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  auto-review:
    name: Trigger PR Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Post review reminder
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const alreadyPosted = comments.some(c =>
              c.body.includes('Ready for review')
              && c.user.type === 'Bot'
            );

            if (!alreadyPosted) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '## Ready for review',
                  '',
                  'This PR is ready for review. To trigger an agent review:',
                  '',
                  '```',
                  '/review-pr #' + context.issue.number,
                  '```',
                  '',
                  '---',
                  '*Automated by auto-review workflow.*',
                ].join('\n'),
              });
            }
