services:
  - type: web
    name: agile-flow-starter
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    previewsEnabled: true
    envVars:
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
